<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space IELTS - Reading Practice</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        :root {
            --space-blue: #007bff; /* Твой синий из кнопки */
            --space-black: #1a1a1a;
            --space-gray: #f8f9fa;
            --test-header-h: 60px;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--space-gray);
            padding-top: var(--test-header-h);
            box-sizing: border-box;
        }

        .test-main {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-height: calc(100vh - var(--test-header-h));
        }

        .test-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: var(--test-header-h);
            background: white;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            color: var(--space-black);
            box-sizing: border-box;
        }

        .test-header__brand {
            justify-self: start;
            min-width: 0;
        }

        .test-header__timer {
            justify-self: center;
        }

        .test-header__spacer {
            justify-self: end;
            width: 100%;
            min-height: 1px;
        }

        .reading-timer {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-variant-numeric: tabular-nums;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #1a1a1a;
            user-select: none;
        }

        .reading-timer__icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            color: #333;
        }

        .reading-timer.reading-timer--warning .reading-timer__digits,
        .reading-timer.reading-timer--warning .reading-timer__icon {
            color: #c62828;
        }

        .test-container {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .test-footer {
            box-sizing: border-box;
            flex-shrink: 0;
            padding: 12px 16px 16px;
            background: #fff;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 12px;
            align-items: stretch;
        }

        .part-nav-block {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #fafafa;
            cursor: pointer;
            text-align: left;
            font: inherit;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .part-nav-block:hover {
            border-color: #b8d4f0;
            background: #f5f9ff;
        }

        .part-nav-block.part-nav-block--active {
            border-color: var(--space-blue);
            background: #e8f4ff;
            box-shadow: 0 0 0 1px rgba(0, 123, 255, 0.15);
        }

        .part-nav-block__title {
            display: block;
            font-size: 1.05rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .part-nav-block__count {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
        }

        .part-nav-block__nums {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .q-num-chip {
            min-width: 2rem;
            padding: 4px 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fff;
            font-size: 0.78rem;
            font-weight: 700;
            color: #444;
            cursor: pointer;
            line-height: 1.2;
        }

        .q-num-chip:hover {
            border-color: var(--space-blue);
            color: var(--space-blue);
        }

        .part-nav-block.part-nav-block--active .q-num-chip.q-num-chip--in-active-part {
            background: var(--space-blue);
            border-color: var(--space-blue);
            color: #fff;
        }

        .q-num-chip:focus-visible {
            outline: 2px solid var(--space-blue);
            outline-offset: 2px;
        }

        /* Левая панель: 55% ширины; правая: 45% минус разделитель 8px */
        #left-panel {
            box-sizing: border-box;
            flex: 0 0 55%;
            width: 55%;
            max-width: 55%;
            min-width: 0;
            padding: 40px 0;
            overflow-y: auto;
            overflow-x: hidden;
            background: white;
            color: #333;
        }

        .passage-part.reading-passage {
            box-sizing: border-box;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 30px;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .passage-part {
            display: none;
        }

        .passage-part.active {
            display: block;
        }

        .passage-panel-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            color: var(--space-black);
            letter-spacing: -0.02em;
        }

        .passage-panel-subtitle {
            margin: 0 0 1.25rem;
            font-size: 1rem;
            font-weight: 600;
            color: #444;
            line-height: 1.45;
        }

        .reading-passage p {
            margin-top: 0;
            margin-bottom: 24px;
        }

        .reading-passage p:last-child {
            margin-bottom: 0;
        }

        /* Разделитель */
        #resizer {
            flex: 0 0 8px;
            width: 8px;
            cursor: col-resize;
            background: #eee;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        #resizer:hover {
            background: var(--space-blue);
        }

        #resizer::before {
            content: "⬌";
            color: #888;
            font-size: 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 2px;
            position: absolute;
            z-index: 10;
        }

        #right-panel {
            box-sizing: border-box;
            flex: 0 0 calc(45% - 8px);
            width: calc(45% - 8px);
            max-width: calc(45% - 8px);
            min-width: 0;
            padding: 40px;
            padding-bottom: 100px;
            overflow-y: auto;
            overflow-x: hidden;
            background: var(--space-gray);
        }

        @media (max-width: 1023px) {
            .test-container {
                flex-direction: column;
                flex: 1 1 auto;
                min-height: 0;
                overflow-y: auto;
                overflow-x: hidden;
            }

            .test-footer {
                flex-direction: column;
            }

            .part-nav-block {
                flex: none;
            }

            #left-panel {
                width: 100% !important;
                flex: none;
                min-height: 0;
                overflow-y: visible;
            }

            .passage-part.reading-passage {
                max-width: none;
                padding-left: 30px;
                padding-right: 30px;
            }

            #resizer {
                display: none;
            }

            #right-panel {
                flex: none !important;
                width: 100% !important;
                max-width: none !important;
                overflow-y: visible;
            }
        }

        .question-block {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        h2 { color: var(--space-black); margin-top: 0; }

        .instruction-text {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .section-title {
            display: block;
            margin: 1.1rem 0 0.65rem;
            font-size: 1.12rem;
            font-weight: 700;
            line-height: 1.35;
            color: #1a1a1a;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .task-heading {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--space-black);
            margin: 0 0 14px;
            letter-spacing: -0.02em;
        }

        .tf-block {
            padding-bottom: 8px;
        }

        .tf-lead {
            margin: 0 0 10px;
            font-size: 1rem;
            line-height: 1.55;
            color: #333;
        }

        .tf-boxes-hint {
            margin: 0 0 14px;
            font-size: 0.95rem;
            color: #444;
            line-height: 1.5;
        }

        .tf-rules {
            margin: 0 0 18px;
            padding: 14px 16px 14px 32px;
            background: #f7f8fa;
            border-radius: 8px;
            border: 1px solid #e8eaed;
            font-size: 0.95rem;
            line-height: 1.65;
            color: #222;
        }

        .tf-rules li {
            margin-bottom: 6px;
        }

        .tf-rules li:last-child {
            margin-bottom: 0;
        }

        .tf-keywords {
            margin: 0 0 18px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #333;
        }

        .tf-questions-list {
            margin-top: 6px;
        }

        .tf-item {
            padding: 16px 0;
            border-top: 1px solid #e8e8e8;
        }

        .tf-item:first-child {
            border-top: none;
            padding-top: 4px;
        }

        .tf-item-label {
            margin: 0 0 8px;
            font-size: 0.88rem;
            font-weight: 700;
            color: #555;
        }

        .tf-statement {
            margin: 0 0 12px;
            font-size: 1rem;
            line-height: 1.55;
            color: #222;
        }

        .tf-select-wrap {
            margin: 0;
        }

        .tf-select-wrap select {
            margin-top: 0;
            max-width: 100%;
        }

        /* Стили инпутов в твоем стиле */
        select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        .gap-fill-block {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .gap-fill-lead {
            margin: 0 0 10px;
            font-size: 1rem;
            line-height: 1.55;
            color: #333;
        }

        .gap-fill-body {
            line-height: 1.85;
            color: #222;
            font-size: 1rem;
            white-space: pre-wrap;
        }

        .gap-fill-body .section-title + * {
            margin-top: 0.25rem;
        }

        /* IELTS-style: dark number badge + answer line, flush */
        .gap-slot-wrap {
            display: inline-flex;
            align-items: flex-end;
            gap: 0;
            vertical-align: baseline;
            margin: 2px 4px 10px 1px;
        }

        .gap-q-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            min-width: 1.5rem;
            height: 1.45rem;
            padding: 0 6px;
            font-size: 0.72rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.02em;
            color: #f5f5f5;
            background: #2d2d2d;
            border: 1px solid #1a1a1a;
            border-radius: 3px 0 0 3px;
            border-right: none;
            flex-shrink: 0;
            user-select: none;
        }

        .gap-fill-body .gap-slot-wrap .gap-input {
            display: inline-block;
            vertical-align: bottom;
            width: 132px;
            min-width: 120px;
            max-width: 200px;
            padding: 3px 6px 4px;
            margin: 0;
            font: inherit;
            font-size: 1em;
            line-height: inherit;
            border: none;
            border-bottom: 1px solid #888;
            border-radius: 0 0 2px 0;
            background: transparent;
            box-shadow: none;
            box-sizing: border-box;
        }

        .gap-fill-body .gap-slot-wrap .gap-input:focus {
            outline: none;
            border-bottom-color: var(--space-blue);
            background: rgba(0, 123, 255, 0.06);
        }

        .gap-fill-body .gap-slot-wrap .gap-input.gap-input--correct {
            border-bottom-color: #2e7d32;
            background: rgba(46, 125, 50, 0.08);
        }

        .gap-fill-body .gap-slot-wrap .gap-input.gap-input--wrong {
            border-bottom-color: #c62828;
            background: rgba(198, 40, 40, 0.08);
        }

        .question-block select {
            margin-top: 10px;
        }

        .question-block select.select-correct {
            border-color: #2e7d32;
            background: #e8f5e9;
        }

        .question-block select.select-wrong {
            border-color: #c62828;
            background: #ffebee;
        }

        .gap-fill-instructions {
            margin: 0 0 18px;
            padding-bottom: 4px;
            border-bottom: 1px solid #ececec;
            color: #333;
            font-size: 0.95rem;
            line-height: 1.55;
        }

        .questions-part {
            display: none;
        }

        .questions-part.active {
            display: block;
        }

        .match-instructions {
            margin: 0 0 12px;
            font-size: 1rem;
            line-height: 1.55;
            color: #333;
        }

        .people-list-block {
            margin: 0 0 18px;
            padding: 14px 16px;
            background: #f7f8fa;
            border-radius: 8px;
            border: 1px solid #e8eaed;
            font-size: 0.95rem;
            line-height: 1.65;
            color: #222;
        }

        .people-list-block p {
            margin: 0 0 8px;
            font-weight: 700;
        }

        .people-list-block ul {
            margin: 0;
            padding-left: 1.25rem;
        }

        .passage-para-letter {
            font-weight: 700;
            color: #000;
        }

        .endings-list-block {
            margin: 0 0 20px;
            padding: 14px 16px;
            background: #f7f8fa;
            border-radius: 8px;
            border: 1px solid #e8eaed;
            font-size: 0.95rem;
            line-height: 1.65;
            color: #222;
        }

        .endings-list-block p {
            margin: 0 0 10px;
            font-weight: 700;
        }

        .endings-list-block ol {
            margin: 0;
            padding-left: 1.35rem;
        }

        .endings-list-block li {
            margin-bottom: 6px;
        }

        .endings-list-block li:last-child {
            margin-bottom: 0;
        }

        .mc-fieldset,
        .ynng-fieldset {
            border: none;
            margin: 0;
            padding: 0;
        }

        .mc-prompt {
            margin: 0 0 14px;
            font-size: 1rem;
            line-height: 1.55;
            color: #222;
        }

        .mc-options,
        .ynng-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mc-option,
        .ynng-option {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            background: #fafafa;
            cursor: pointer;
            line-height: 1.5;
            font-size: 0.98rem;
        }

        .mc-option:hover,
        .ynng-option:hover {
            border-color: #ccc;
        }

        .mc-option input,
        .ynng-option input {
            margin-top: 4px;
            flex-shrink: 0;
        }

        .mc-fieldset.mc-fieldset--correct,
        .ynng-fieldset.ynng-fieldset--correct {
            outline: 2px solid #2e7d32;
            outline-offset: 2px;
            border-radius: 8px;
        }

        .mc-fieldset.mc-fieldset--wrong,
        .ynng-fieldset.ynng-fieldset--wrong {
            outline: 2px solid #c62828;
            outline-offset: 2px;
            border-radius: 8px;
        }

        .submit-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 900;
            background-color: var(--space-blue);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0, 123, 255, 0.45);
            transition: transform 0.2s, filter 0.2s;
        }

        .submit-fab:hover:not(:disabled) {
            transform: scale(1.03);
            filter: brightness(1.08);
        }

        .submit-fab:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .result-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.45);
            box-sizing: border-box;
        }

        .result-modal.result-modal--open {
            display: flex;
        }

        .result-modal__panel {
            background: #fff;
            border-radius: 16px;
            padding: 28px 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
            text-align: center;
        }

        .result-modal__title {
            margin: 0 0 16px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--space-black);
        }

        .result-modal__score {
            margin: 0 0 24px;
            font-size: 1.15rem;
            line-height: 1.5;
            color: #333;
        }

        .result-modal__score strong {
            color: var(--space-blue);
            font-size: 1.2rem;
        }

        .result-modal__detail {
            display: block;
            margin-top: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #444;
        }

        .guest-result-toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            z-index: 2000;
            max-width: min(520px, calc(100vw - 32px));
            padding: 12px 18px;
            border-radius: 10px;
            background: #1a1a1a;
            color: #f5f5f5;
            font-size: 0.9rem;
            line-height: 1.45;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
            text-align: center;
        }

        .guest-result-toast[hidden] {
            display: none !important;
        }

        .result-modal__close {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            background: var(--space-blue);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        .result-modal__close:hover {
            filter: brightness(1.08);
        }

        .confirm-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1500;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.45);
            box-sizing: border-box;
        }

        .confirm-modal.confirm-modal--open {
            display: flex;
        }

        .confirm-modal__panel {
            background: #fff;
            border-radius: 16px;
            padding: 24px 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
        }

        .confirm-modal__text {
            margin: 0 0 20px;
            font-size: 1.05rem;
            line-height: 1.5;
            color: #222;
        }

        .confirm-modal__actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .confirm-modal__actions button {
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
        }

        .confirm-modal__cancel {
            background: #eee;
            color: #333;
        }

        .confirm-modal__ok {
            background: var(--space-blue);
            color: #fff;
        }

        .reading-review-mode .passage-highlight {
            background: #fff59d;
            border-radius: 2px;
            padding: 0 1px;
        }

        .passage-highlight__badge {
            display: inline-block;
            margin-left: 5px;
            font-size: 0.62rem;
            font-weight: 700;
            vertical-align: super;
            line-height: 1;
            padding: 2px 5px;
            background: #2d2d2d;
            color: #fff;
            border-radius: 3px;
            position: relative;
            top: -0.15em;
        }

        .question-feedback {
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .question-feedback--wrong {
            background: #ffebee;
            border: 1px solid #ffcdd2;
        }

        .question-feedback__row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .question-feedback__x {
            color: #c62828;
            font-weight: 900;
            font-size: 1.1rem;
            line-height: 1.2;
            flex-shrink: 0;
        }

        .question-feedback__answer {
            color: #b71c1c;
            font-weight: 700;
        }

        .question-feedback__explain {
            margin-top: 10px;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid var(--space-blue);
            background: #fff;
            color: var(--space-blue);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .question-feedback__explain-body {
            margin-top: 10px;
            padding: 10px 12px;
            background: #f5f9ff;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #333;
            line-height: 1.5;
        }

        .q-num-chip.q-num-chip--correct {
            background: #2e7d32 !important;
            border-color: #2e7d32 !important;
            color: #fff !important;
        }

        .q-num-chip.q-num-chip--wrong {
            background: #c62828 !important;
            border-color: #c62828 !important;
            color: #fff !important;
        }

        .part-nav-block.part-nav-block--active .q-num-chip.q-num-chip--correct {
            background: #2e7d32 !important;
            border-color: #2e7d32 !important;
            color: #fff !important;
        }

        .part-nav-block.part-nav-block--active .q-num-chip.q-num-chip--wrong {
            background: #c62828 !important;
            border-color: #c62828 !important;
            color: #fff !important;
        }

        /* TRUE/FALSE/NOT GIVEN — button groups (reading-engine.js) */
        .tf-btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 0;
            padding: 4px 0;
        }

        .tf-answer-btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            background: #fafafa;
            cursor: pointer;
            font: inherit;
            font-weight: 600;
            font-size: 0.98rem;
            color: #222;
            line-height: 1.45;
            transition: border-color 0.2s, background 0.2s;
        }

        .tf-answer-btn:hover {
            border-color: #ccc;
        }

        .tf-answer-btn.tf-answer-btn--selected {
            border-color: var(--space-blue);
            background: #e8f4ff;
            box-shadow: 0 0 0 1px rgba(0, 123, 255, 0.2);
        }

        .tf-btn-group.tf-btn-group--correct {
            outline: 2px solid #2e7d32;
            outline-offset: 4px;
            border-radius: 8px;
        }

        .tf-btn-group.tf-btn-group--wrong {
            outline: 2px solid #c62828;
            outline-offset: 4px;
            border-radius: 8px;
        }

    </style>
</head>
<body>

<div class="test-header">
    <div class="test-header__brand">
        SPACE IELTS | <span id="test-title" style="margin-left: 10px; font-weight: normal;">Loading...</span>
    </div>
    <div class="test-header__timer">
        <div class="reading-timer" id="reading-timer" aria-live="polite" aria-atomic="true">
            <svg class="reading-timer__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
            </svg>
            <span class="reading-timer__digits" id="timer-digits">01:00:00</span>
        </div>
    </div>
    <div class="test-header__spacer" aria-hidden="true"></div>
</div>

<div class="test-main">
<div class="test-container">
    <div id="left-panel">
    </div>

    <div id="resizer"></div>

    <div id="right-panel">
        <div id="questions-container"></div>
    </div>
</div>

<footer class="test-footer" id="test-footer" aria-label="Reading parts"></footer>
</div>

<button type="button" id="submit-btn" class="submit-fab" aria-label="Submit answers">Submit</button>

<div id="confirm-modal" class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-text">
    <div class="confirm-modal__panel">
        <p id="confirm-modal-text" class="confirm-modal__text">Are you sure you want to submit your answers?</p>
        <div class="confirm-modal__actions">
            <button type="button" class="confirm-modal__cancel" id="confirm-modal-cancel">Cancel</button>
            <button type="button" class="confirm-modal__ok" id="confirm-modal-ok">OK</button>
        </div>
    </div>
</div>

<div id="result-modal" class="result-modal" role="dialog" aria-modal="true" aria-labelledby="result-modal-title">
    <div class="result-modal__panel">
        <h2 id="result-modal-title" class="result-modal__title">Test complete</h2>
        <p id="result-modal-score" class="result-modal__score"></p>
        <button type="button" class="result-modal__close" id="result-modal-close">OK</button>
    </div>
</div>

<div id="guest-result-toast" class="guest-result-toast" hidden role="status" aria-live="polite">
    Note: Your result is not saved. Register to keep track of your scores.
</div>

<!-- Reading test stays public: no auth guard or login redirect on this page. -->
<script src="js/app/test-storage.js"></script>
<script src="js/app/reading-engine.js"></script>

</body>
</html>
